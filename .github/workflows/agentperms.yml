name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable, with dev deps)
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest -q

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Scanner flags the bundled vulnerable demo
        # The demo is deliberately over-privileged, so scan must exit non-zero
        # (HIGH findings). A clean exit here would mean the scanner regressed.
        run: |
          if agentperms scan --path examples/vulnerable-mcp-demo; then
            echo "::error::Scanner did not flag the known-vulnerable demo"
            exit 1
          fi
          echo "Scanner correctly flagged the demo."
      - name: Replay the attack pack against the example policy
        run: agentperms replay --policy examples/policies/example.mcp.policy.yaml
