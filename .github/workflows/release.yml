name: Publish to PyPI

# Publishes on a version tag (e.g. v0.1.0). Uses PyPI Trusted Publishing
# (OIDC) — no API token stored in GitHub secrets.
#
# One-time setup on PyPI: https://pypi.org/manage/account/publishing/
#   - Project name: agentperms
#   - Owner: hasanmehmood
#   - Repository: agentperms
#   - Workflow filename: release.yml
#   - Environment name: pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
